<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>넘어짐 감지 백룸 카메라</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #overlayText {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    #controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      background: rgba(255,255,255,0.92);
      color: #111;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.92;
    }

    #backroomsLayer {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 245, 170, 0.08) 0px,
          rgba(255, 245, 170, 0.08) 2px,
          rgba(235, 220, 120, 0.12) 2px,
          rgba(235, 220, 120, 0.12) 4px
        ),
        linear-gradient(180deg, #c6b95f 0%, #b7aa55 55%, #8f8342 100%);
      animation: flicker 0.18s infinite alternate;
      overflow: hidden;
    }

    #backroomsLayer.active {
      display: block;
    }

    #backroomsNoise {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(0,0,0,0.02) 0px,
          rgba(0,0,0,0.02) 1px,
          rgba(255,255,255,0.01) 1px,
          rgba(255,255,255,0.01) 2px
        );
      mix-blend-mode: multiply;
      pointer-events: none;
      animation: noiseMove 0.1s infinite linear;
    }

    #backroomsVignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    #flash {
      position: absolute;
      inset: 0;
      z-index: 40;
      background: #fff8c4;
      opacity: 0;
      pointer-events: none;
    }

    #flash.active {
      animation: flashAnim 0.45s ease-out;
    }

    #backroomsMessage {
      position: absolute;
      inset: 0;
      z-index: 35;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      font-size: clamp(24px, 5vw, 54px);
      font-weight: bold;
      color: #2e2500;
      text-shadow: 0 0 8px rgba(255,255,200,0.35);
      letter-spacing: 2px;
    }

    #entity {
      position: absolute;
      right: 12%;
      bottom: 8%;
      width: 120px;
      height: 220px;
      background: rgba(0,0,0,0.8);
      filter: blur(1px);
      border-radius: 50px 50px 20px 20px;
      opacity: 0;
      transform: translateX(120px);
    }

    #entity.show {
      animation: entityPeek 1.4s ease-in-out;
    }

    .shake {
      animation: shake 0.35s linear 2;
    }

    @keyframes shake {
      0%   { transform: translate(0px, 0px); }
      20%  { transform: translate(-8px, 2px); }
      40%  { transform: translate(7px, -2px); }
      60%  { transform: translate(-6px, 3px); }
      80%  { transform: translate(6px, -1px); }
      100% { transform: translate(0px, 0px); }
    }

    @keyframes flicker {
      from { filter: brightness(1) contrast(1); }
      to   { filter: brightness(1.08) contrast(1.07); }
    }

    @keyframes noiseMove {
      from { transform: translateY(0px); }
      to   { transform: translateY(6px); }
    }

    @keyframes flashAnim {
      0%   { opacity: 0; }
      20%  { opacity: 0.9; }
      100% { opacity: 0; }
    }

    @keyframes entityPeek {
      0%   { opacity: 0; transform: translateX(130px); }
      30%  { opacity: 0.95; transform: translateX(0px); }
      70%  { opacity: 0.95; transform: translateX(0px); }
      100% { opacity: 0; transform: translateX(130px); }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="overlayText">카메라 시작 중...</div>

    <div id="controls">
      <button id="startBtn">카메라 시작</button>
      <button id="resetBtn">백룸에서 복귀</button>
    </div>

    <div id="flash"></div>

    <div id="backroomsLayer">
      <div id="backroomsNoise"></div>
      <div id="backroomsVignette"></div>
      <div id="backroomsMessage">YOU CLIPPED INTO<br>THE BACKROOMS</div>
      <div id="entity"></div>
    </div>
  </div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const overlayText = document.getElementById("overlayText");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const flash = document.getElementById("flash");
    const backroomsLayer = document.getElementById("backroomsLayer");
    const entity = document.getElementById("entity");
    const app = document.getElementById("app");

    let mpCamera = null;
    let pose = null;
    let started = false;
    let inBackrooms = false;

    let fallScore = 0;
    let bodyAngleHistory = [];
    let torsoYHistory = [];
    let lastTriggerTime = 0;

    function resizeCanvas() {
      canvas.width = video.videoWidth || window.innerWidth;
      canvas.height = video.videoHeight || window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);

    function average(arr) {
      if (!arr.length) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function pushLimited(arr, value, limit) {
      arr.push(value);
      if (arr.length > limit) arr.shift();
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function midpoint(a, b) {
      return {
        x: (a.x + b.x) / 2,
        y: (a.y + b.y) / 2
      };
    }

    function angleFromVerticalDeg(a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const angleRad = Math.atan2(dy, dx);
      const angleDeg = Math.abs(angleRad * 180 / Math.PI);
      const verticalDiff = Math.abs(90 - angleDeg);
      return verticalDiff;
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function drawStatus(text) {
      overlayText.textContent = text;
    }

    function triggerBackrooms(reasonText) {
      if (inBackrooms) return;

      const now = Date.now();
      if (now - lastTriggerTime < 2500) return;
      lastTriggerTime = now;

      inBackrooms = true;
      backroomsLayer.classList.add("active");
      flash.classList.remove("active");
      void flash.offsetWidth;
      flash.classList.add("active");

      app.classList.add("shake");
      setTimeout(() => app.classList.remove("shake"), 800);

      drawStatus("상태: 백룸 진입 감지\n" + reasonText);

      if (Math.random() < 0.7) {
        setTimeout(() => {
          entity.classList.remove("show");
          void entity.offsetWidth;
          entity.classList.add("show");
        }, 700);
      }

      playBackroomsHum();
    }

    function resetBackrooms() {
      inBackrooms = false;
      backroomsLayer.classList.remove("active");
      entity.classList.remove("show");
      drawStatus("상태: 감시 중");
      fallScore = 0;
      bodyAngleHistory = [];
      torsoYHistory = [];
    }

    function playBackroomsHum() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContextClass();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const lowpass = audioCtx.createBiquadFilter();

        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(58, audioCtx.currentTime);

        lowpass.type = "lowpass";
        lowpass.frequency.setValueAtTime(350, audioCtx.currentTime);

        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.04, audioCtx.currentTime + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);

        osc.connect(lowpass);
        lowpass.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 1.25);
      } catch (e) {
        console.log("오디오 재생 실패:", e);
      }
    }

    function getLandmark(landmarks, index) {
      const p = landmarks[index];
      if (!p) return null;
      return {
        x: p.x * canvas.width,
        y: p.y * canvas.height,
        visibility: p.visibility ?? 1
      };
    }

    function analyzePose(landmarks) {
      const leftShoulder = getLandmark(landmarks, 11);
      const rightShoulder = getLandmark(landmarks, 12);
      const leftHip = getLandmark(landmarks, 23);
      const rightHip = getLandmark(landmarks, 24);
      const nose = getLandmark(landmarks, 0);

      if (!leftShoulder || !rightShoulder || !leftHip || !rightHip || !nose) {
        drawStatus("상태: 포인트 부족");
        return;
      }

      const shoulderMid = midpoint(leftShoulder, rightShoulder);
      const hipMid = midpoint(leftHip, rightHip);

      const torsoLength = distance(shoulderMid, hipMid);
      const shoulderWidth = distance(leftShoulder, rightShoulder);
      const bodyAngle = angleFromVerticalDeg(shoulderMid, hipMid);
      const torsoCenterY = (shoulderMid.y + hipMid.y) / 2;

      pushLimited(bodyAngleHistory, bodyAngle, 8);
      pushLimited(torsoYHistory, torsoCenterY, 8);

      const avgAngle = average(bodyAngleHistory);
      const avgTorsoY = average(torsoYHistory);
      const ratio = shoulderWidth / Math.max(torsoLength, 1);

      const lyingLikely = avgAngle > 50 || ratio > 1.2;
      const droppedDown = torsoCenterY - avgTorsoY > canvas.height * 0.04;

      if (lyingLikely) {
        fallScore += 1.2;
      } else {
        fallScore -= 0.7;
      }

      if (droppedDown) {
        fallScore += 1.0;
      }

      fallScore = clamp(fallScore, 0, 12);

      let status = [
        "상태: 감시 중",
        "기울기: " + avgAngle.toFixed(1) + "°",
        "가로/세로 비율: " + ratio.toFixed(2),
        "낙상 점수: " + fallScore.toFixed(1)
      ].join("\n");

      if (lyingLikely) {
        status += "\n판정: 눕거나 심하게 기울어짐";
      }

      drawStatus(status);

      if (!inBackrooms && fallScore >= 6) {
        triggerBackrooms(
          "이유: 몸이 크게 기울었거나\n옆으로 누운 자세로 감지됨"
        );
      }

      drawPose(leftShoulder, rightShoulder, leftHip, rightHip, nose, shoulderMid, hipMid);
    }

    function drawCircle(p, r, color) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawLine(a, b, color, width = 4) {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
    }

    function drawPose(ls, rs, lh, rh, nose, shoulderMid, hipMid) {
      ctx.save();

      drawLine(ls, rs, "#00e5ff", 4);
      drawLine(lh, rh, "#00e5ff", 4);
      drawLine(shoulderMid, hipMid, "#ffeb3b", 6);

      drawCircle(ls, 6, "#00e5ff");
      drawCircle(rs, 6, "#00e5ff");
      drawCircle(lh, 6, "#00e5ff");
      drawCircle(rh, 6, "#00e5ff");
      drawCircle(nose, 6, "#ff5252");
      drawCircle(shoulderMid, 7, "#7cff6b");
      drawCircle(hipMid, 7, "#7cff6b");

      ctx.restore();
    }

    async function initPose() {
      pose = new Pose({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults((results) => {
        resizeCanvas();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        if (results.poseLandmarks) {
          analyzePose(results.poseLandmarks);
        } else {
          drawStatus("상태: 사람을 찾는 중...");
          fallScore = Math.max(0, fallScore - 0.5);
        }
      });
    }

    async function startCamera() {
      if (started) return;

      try {
        await initPose();

        mpCamera = new Camera(video, {
          onFrame: async () => {
            if (!pose) return;
            await pose.send({ image: video });
          },
          width: 960,
          height: 720
        });

        await mpCamera.start();
        started = true;
        drawStatus("상태: 감시 중");
      } catch (err) {
        console.error(err);
        drawStatus("카메라 시작 실패\n브라우저 권한 또는 https 환경을 확인해줘");
      }
    }

    startBtn.addEventListener("click", async () => {
      await startCamera();
    });

    resetBtn.addEventListener("click", () => {
      resetBackrooms();
    });
  </script>
</body>
</html>
