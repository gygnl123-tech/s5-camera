<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백룸 카메라 최종판</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

video, canvas {
  position: absolute;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 50;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 10px;
}

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
}

button, input {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

/* 노란 경고 */
#yellow {
  position: absolute;
  inset: 0;
  background: rgba(255, 220, 0, 0.3);
  opacity: 0;
  z-index: 20;
  transition: 0.3s;
}

/* 백룸 */
#backrooms {
  position: absolute;
  inset: 0;
  display: none;
  z-index: 30;
}

#backrooms img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 엔티티 */
#entity {
  position: absolute;
  right: 10%;
  bottom: 10%;
  width: 120px;
  opacity: 0;
}

.show {
  animation: entity 1.5s;
}

@keyframes entity {
  0% {opacity:0; transform:translateX(100px);}
  50% {opacity:1; transform:translateX(0);}
  100% {opacity:0; transform:translateX(100px);}
}

/* 흔들림 */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% {transform:translate(0);}
  25% {transform:translate(-10px);}
  50% {transform:translate(10px);}
  75% {transform:translate(-10px);}
  100% {transform:translate(0);}
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="yellow"></div>

<div id="backrooms">
  <img id="bg">
  <img id="entity" src="">
</div>

<div id="ui">
상태: 대기중<br>
넘어짐: <span id="count">0</span>
</div>

<div id="controls">
<button onclick="start()">카메라 시작</button>
<button onclick="reset()">초기화</button>
<input type="file" id="picker" accept="image/*">
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const yellow = document.getElementById("yellow");
const backrooms = document.getElementById("backrooms");
const bg = document.getElementById("bg");
const entity = document.getElementById("entity");

const countText = document.getElementById("count");
const picker = document.getElementById("picker");

let fallScore = 0;
let fallCount = 0;
let lock = false;

/* 📸 이미지 선택 */
picker.addEventListener("change", e=>{
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev=>{
    bg.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

/* 🎥 카메라 */
async function start() {
  const pose = new Pose({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(res=>{
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(res.image,0,0,canvas.width,canvas.height);

    if(res.poseLandmarks){
      detect(res.poseLandmarks);
    }
  });

  const cam = new Camera(video,{
    onFrame: async ()=>{
      await pose.send({image: video});
    },
    width:640,
    height:480
  });

  cam.start();
}

/* 🤖 넘어짐 감지 */
function detect(lm){
  const s1 = lm[11];
  const s2 = lm[12];
  const h1 = lm[23];
  const h2 = lm[24];

  const dy = Math.abs((s1.y+s2.y)/2 - (h1.y+h2.y)/2);
  const dx = Math.abs((s1.x+s2.x)/2 - (h1.x+h2.x)/2);

  if(dx > dy){
    fallScore += 1;
  } else {
    fallScore -= 0.5;
  }

  fallScore = Math.max(0, Math.min(10, fallScore));

  if(fallScore > 6 && !lock){
    fall();
  }
}

/* 💥 넘어짐 이벤트 */
function fall(){
  lock = true;
  fallCount++;
  countText.textContent = fallCount;

  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),400);

  if(fallCount == 1){
    yellow.style.opacity = 1;
  }
  else if(fallCount >= 2){
    yellow.style.opacity = 0;
    backrooms.style.display = "block";

    if(Math.random() < 0.7){
      entity.classList.add("show");
      setTimeout(()=>entity.classList.remove("show"),1500);
    }
  }

  setTimeout(()=>{
    lock = false;
    fallScore = 0;
  },2000);
}

/* 🔄 초기화 */
function reset(){
  fallCount = 0;
  fallScore = 0;
  lock = false;
  yellow.style.opacity = 0;
  backrooms.style.display = "none";
  countText.textContent = 0;
}
</script>

</body>
</html>
