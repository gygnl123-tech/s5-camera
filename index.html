<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진짜 이미지 백룸 카메라</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: min(92vw, 420px);
    }

    .panel {
      background: rgba(0,0,0,0.45);
      border-radius: 14px;
      padding: 10px 14px;
      line-height: 1.45;
      white-space: pre-line;
      backdrop-filter: blur(4px);
      font-size: 14px;
    }

    #controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(255,255,255,0.94);
      color: #111;
    }

    #yellowWarning {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      background:
        linear-gradient(rgba(255, 230, 80, 0.22), rgba(180, 145, 0, 0.18)),
        radial-gradient(circle at center, rgba(255,255,190,0.18), rgba(90,70,0,0.28));
      transition: opacity 0.35s ease;
    }

    #yellowWarning.active {
      opacity: 1;
      animation: yellowPulse 1s infinite alternate;
    }

    #yellowWarningText {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(24px, 4vw, 46px);
      font-weight: 900;
      color: #fff7b8;
      text-shadow: 0 0 12px rgba(0,0,0,0.55);
      letter-spacing: 2px;
      text-align: center;
    }

    @keyframes yellowPulse {
      from { filter: brightness(1) saturate(1); }
      to   { filter: brightness(1.1) saturate(1.2); }
    }

    #flash {
      position: absolute;
      inset: 0;
      z-index: 70;
      background: #fff6bf;
      opacity: 0;
      pointer-events: none;
    }

    #flash.active {
      animation: flashAnim 0.45s ease-out;
    }

    @keyframes flashAnim {
      0%   { opacity: 0; }
      25%  { opacity: 0.95; }
      100% { opacity: 0; }
    }

    #backroomsScene {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      overflow: hidden;
      background: #000;
    }

    #backroomsScene.active {
      display: block;
    }

    #backroomsImage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.05) saturate(1.05) brightness(0.95);
    }

    #backroomsOverlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle, rgba(0,0,0,0) 35%, rgba(0,0,0,0.58) 100%),
        repeating-linear-gradient(
          90deg,
          rgba(0,0,0,0.02) 0px,
          rgba(0,0,0,0.02) 1px,
          rgba(255,255,255,0.01) 1px,
          rgba(255,255,255,0.01) 2px
        );
      pointer-events: none;
      animation: noiseMove 0.08s infinite linear;
    }

    @keyframes noiseMove {
      from { transform: translateY(0px); }
      to   { transform: translateY(6px); }
    }

    #levelText {
      position: absolute;
      top: 16px;
      right: 18px;
      z-index: 40;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 900;
      color: #fff5b0;
      text-shadow: 0 0 8px rgba(0,0,0,0.7);
      background: rgba(0,0,0,0.25);
      padding: 10px 14px;
      border-radius: 14px;
    }

    #entity {
      position: absolute;
      right: 8%;
      bottom: 12%;
      width: 130px;
      max-width: 20vw;
      opacity: 0;
      transform: translateX(140px);
      filter: brightness(0.2) contrast(1.4);
    }

    #entity.show {
      animation: entityPeek 1.5s ease-in-out;
    }

    @keyframes entityPeek {
      0%   { opacity: 0; transform: translateX(140px); }
      30%  { opacity: 0.92; transform: translateX(0px); }
      70%  { opacity: 0.92; transform: translateX(0px); }
      100% { opacity: 0; transform: translateX(140px); }
    }

    .shake {
      animation: shake 0.35s linear 2;
    }

    @keyframes shake {
      0%   { transform: translate(0px, 0px); }
      20%  { transform: translate(-8px, 2px); }
      40%  { transform: translate(7px, -2px); }
      60%  { transform: translate(-6px, 3px); }
      80%  { transform: translate(6px, -1px); }
      100% { transform: translate(0px, 0px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="yellowWarning">
      <div id="yellowWarningText">WARNING<br>노란 필터 단계</div>
    </div>

    <div id="backroomsScene">
      <img id="backroomsImage" src="https://imgur.com/a/4qAgfkB" alt="백룸 배경">
      <img id="entity" src="entity.png" alt="엔티티">
      <div id="backroomsOverlay"></div>
      <div id="levelText">LEVEL 0</div>
    </div>

    <div id="flash"></div>

    <div id="ui">
      <div id="status" class="panel">카메라 시작 전</div>
      <div id="counter" class="panel">넘어짐 횟수: 0 / 단계: 정상</div>
    </div>

    <div id="controls">
      <button id="startBtn">카메라 시작</button>
      <button id="resetBtn">초기화</button>
      <button id="clearFallBtn">넘어짐 횟수 0으로</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const statusBox = document.getElementById("status");
    const counterBox = document.getElementById("counter");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clearFallBtn = document.getElementById("clearFallBtn");

    const yellowWarning = document.getElementById("yellowWarning");
    const backroomsScene = document.getElementById("backroomsScene");
    const flash = document.getElementById("flash");
    const entity = document.getElementById("entity");
    const app = document.getElementById("app");

    let pose = null;
    let mpCamera = null;
    let started = false;

    let fallScore = 0;
    let fallCount = 0;
    let inBackrooms = false;
    let warningMode = false;

    let bodyAngleHistory = [];
    let torsoYHistory = [];
    let lockout = false;

    function resizeCanvas() {
      canvas.width = video.videoWidth || window.innerWidth;
      canvas.height = video.videoHeight || window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);

    function average(arr) {
      if (!arr.length) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function pushLimited(arr, value, limit) {
      arr.push(value);
      if (arr.length > limit) arr.shift();
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function midpoint(a, b) {
      return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    }

    function angleFromVerticalDeg(a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const angleRad = Math.atan2(dy, dx);
      const angleDeg = Math.abs(angleRad * 180 / Math.PI);
      return Math.abs(90 - angleDeg);
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function updateCounter() {
      let stage = "정상";
      if (fallCount === 1) stage = "노란 필터 단계";
      if (fallCount >= 2) stage = "백룸 진입";
      counterBox.textContent = "넘어짐 횟수: " + fallCount + " / 단계: " + stage;
    }

    function getLandmark(landmarks, index) {
      const p = landmarks[index];
      if (!p) return null;
      return {
        x: p.x * canvas.width,
        y: p.y * canvas.height,
        visibility: p.visibility ?? 1
      };
    }

    function drawCircle(p, r, color) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawLine(a, b, color, width = 4) {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
    }

    function drawPose(ls, rs, lh, rh, nose, shoulderMid, hipMid) {
      drawLine(ls, rs, "#00e5ff", 4);
      drawLine(lh, rh, "#00e5ff", 4);
      drawLine(shoulderMid, hipMid, "#ffeb3b", 6);

      drawCircle(ls, 6, "#00e5ff");
      drawCircle(rs, 6, "#00e5ff");
      drawCircle(lh, 6, "#00e5ff");
      drawCircle(rh, 6, "#00e5ff");
      drawCircle(nose, 6, "#ff5252");
      drawCircle(shoulderMid, 7, "#7cff6b");
      drawCircle(hipMid, 7, "#7cff6b");
    }

    function playHum() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContextClass();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(58, audioCtx.currentTime);
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(320, audioCtx.currentTime);

        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.05, audioCtx.currentTime + 0.06);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 1.25);
      } catch (e) {
        console.log("오디오 실패", e);
      }
    }

    function doFlash() {
      flash.classList.remove("active");
      void flash.offsetWidth;
      flash.classList.add("active");
    }

    function doShake() {
      app.classList.add("shake");
      setTimeout(() => app.classList.remove("shake"), 750);
    }

    function showEntitySometimes() {
      if (Math.random() < 0.7) {
        setTimeout(() => {
          entity.classList.remove("show");
          void entity.offsetWidth;
          entity.classList.add("show");
        }, 700);
      }
    }

    function enterWarningStage() {
      warningMode = true;
      yellowWarning.classList.add("active");
      setStatus("상태: 1차 넘어짐 감지\n노란 필터 단계 진입");
      doFlash();
      doShake();
      playHum();
    }

    function enterBackrooms() {
      inBackrooms = true;
      warningMode = false;
      yellowWarning.classList.remove("active");
      backroomsScene.classList.add("active");
      setStatus("상태: 2차 넘어짐 감지\n백룸 진입");
      doFlash();
      doShake();
      playHum();
      showEntitySometimes();
    }

    function registerFall() {
      if (lockout) return;

      fallCount += 1;
      updateCounter();

      if (fallCount === 1) {
        enterWarningStage();
      } else if (fallCount >= 2) {
        enterBackrooms();
      }

      lockout = true;
      setTimeout(() => {
        lockout = false;
        fallScore = 0;
      }, 2200);
    }

    function resetAll() {
      fallScore = 0;
      fallCount = 0;
      inBackrooms = false;
      warningMode = false;
      lockout = false;
      bodyAngleHistory = [];
      torsoYHistory = [];
      yellowWarning.classList.remove("active");
      backroomsScene.classList.remove("active");
      entity.classList.remove("show");
      setStatus("상태: 초기화됨");
      updateCounter();
    }

    function clearFallCount() {
      fallCount = 0;
      inBackrooms = false;
      warningMode = false;
      yellowWarning.classList.remove("active");
      backroomsScene.classList.remove("active");
      entity.classList.remove("show");
      updateCounter();
      setStatus("상태: 넘어짐 횟수만 0으로 초기화");
    }

    function analyzePose(landmarks) {
      const leftShoulder = getLandmark(landmarks, 11);
      const rightShoulder = getLandmark(landmarks, 12);
      const leftHip = getLandmark(landmarks, 23);
      const rightHip = getLandmark(landmarks, 24);
      const nose = getLandmark(landmarks, 0);

      if (!leftShoulder || !rightShoulder || !leftHip || !rightHip || !nose) {
        setStatus("상태: 포인트 부족");
        return;
      }

      const shoulderMid = midpoint(leftShoulder, rightShoulder);
      const hipMid = midpoint(leftHip, rightHip);

      const torsoLength = distance(shoulderMid, hipMid);
      const shoulderWidth = distance(leftShoulder, rightShoulder);
      const bodyAngle = angleFromVerticalDeg(shoulderMid, hipMid);
      const torsoCenterY = (shoulderMid.y + hipMid.y) / 2;

      pushLimited(bodyAngleHistory, bodyAngle, 8);
      pushLimited(torsoYHistory, torsoCenterY, 8);

      const avgAngle = average(bodyAngleHistory);
      const avgTorsoY = average(torsoYHistory);
      const ratio = shoulderWidth / Math.max(torsoLength, 1);

      const lyingLikely = avgAngle > 50 || ratio > 1.2;
      const droppedDown = torsoCenterY - avgTorsoY > canvas.height * 0.04;

      if (lyingLikely) fallScore += 1.2;
      else fallScore -= 0.7;

      if (droppedDown) fallScore += 1.0;

      fallScore = clamp(fallScore, 0, 12);

      let statusText =
        "상태: 감시 중\n" +
        "기울기: " + avgAngle.toFixed(1) + "°\n" +
        "가로/세로 비율: " + ratio.toFixed(2) + "\n" +
        "낙상 점수: " + fallScore.toFixed(1);

      if (warningMode && !inBackrooms) statusText += "\n1차 단계 활성화";
      if (inBackrooms) statusText += "\n백룸 화면 활성화";

      setStatus(statusText);

      if (fallScore >= 6 && !lockout) {
        registerFall();
      }

      drawPose(leftShoulder, rightShoulder, leftHip, rightHip, nose, shoulderMid, hipMid);
    }

    async function initPose() {
      pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults((results) => {
        resizeCanvas();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.poseLandmarks) {
          analyzePose(results.poseLandmarks);
        } else {
          setStatus("상태: 사람을 찾는 중...");
          fallScore = Math.max(0, fallScore - 0.5);
        }
      });
    }

    async function startCamera() {
      if (started) return;

      try {
        await initPose();

        mpCamera = new Camera(video, {
          onFrame: async () => {
            if (!pose) return;
            await pose.send({ image: video });
          },
          width: 960,
          height: 720
        });

        await mpCamera.start();
        started = true;
        updateCounter();
        setStatus("상태: 감시 시작");
      } catch (err) {
        console.error(err);
        setStatus("카메라 시작 실패\n브라우저 권한 또는 https 환경 확인");
      }
    }

    startBtn.addEventListener("click", startCamera);
    resetBtn.addEventListener("click", resetAll);
    clearFallBtn.addEventListener("click", clearFallCount);

    updateCounter();
  </script>
</body>
</html>
